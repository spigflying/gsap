<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AD MODULE LAB — GSAP 數位廣告模組</title>
  <meta name="description" content="同一個廣告模組版型，六種 GSAP 進場效果：3D 翻入、折疊展開、翻頁、捲動視差、景深推進、遮罩橫掃。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --ink: #0E1116;
      --panel: #161B22;
      --panel-2: #1C232C;
      --line: #00E0C6;
      --signal: #FF5C38;
      --grid: rgba(255, 255, 255, 0.05);
      --grid-bold: rgba(255, 255, 255, 0.10);
      --hi: #E8EDF2;
      --lo: #8A95A3;
      --hairline: rgba(255, 255, 255, 0.12);
      --display: "Space Grotesk", system-ui, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --tc: "Noto Sans TC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--ink);
      color: var(--hi);
      font-family: var(--tc);
      line-height: 1.6;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 50% 0%, rgba(0, 224, 198, 0.06), transparent 45%),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: auto, 34px 34px, 34px 34px;
    }

    ::selection {
      background: var(--signal);
      color: #fff;
    }

    a {
      color: var(--line);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .backlink {
      position: fixed;
      left: 18px;
      top: 16px;
      z-index: 60;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .12em;
      color: var(--lo);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      padding: 8px 16px;
      background: rgba(14, 17, 22, 0.7);
      backdrop-filter: blur(6px);
    }

    .backlink:hover {
      color: var(--line);
      border-color: var(--line);
      text-decoration: none;
    }

    /* progress bar top */
    .topbar {
      position: fixed;
      left: 0;
      top: 0;
      height: 3px;
      width: 100%;
      z-index: 60;
      background: var(--grid-bold);
    }

    .topbar i {
      display: block;
      height: 100%;
      width: 100%;
      transform-origin: left;
      transform: scaleX(0);
      background: linear-gradient(90deg, var(--line), var(--signal));
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* hero */
    .intro {
      min-height: 78vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .intro .kicker {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: var(--line);
      margin-bottom: 20px;
    }

    .intro h1 {
      font-family: var(--display);
      font-weight: 700;
      font-size: clamp(40px, 8vw, 104px);
      line-height: .94;
      letter-spacing: -.03em;
    }

    .intro h1 em {
      font-style: normal;
      color: var(--line);
    }

    .intro p {
      max-width: 48ch;
      color: var(--lo);
      font-size: clamp(15px, 1.5vw, 18px);
      margin-top: 24px;
    }

    .intro .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 30px;
    }

    .intro .legend span {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--lo);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      padding: 6px 13px;
    }

    /* one ad module = one scroll stop */
    .ad-stop {
      min-height: 86vh;
      display: flex;
      align-items: center;
      perspective: 1400px;
      /* enables child 3D */
      padding: 60px 0;
    }

    .ad {
      position: relative;
      width: 100%;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--hairline);
      border-radius: 18px;
      padding: clamp(24px, 4vw, 44px);
      transform-style: preserve-3d;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .ad::before {
      /* corner accent */
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 60px;
      height: 60px;
      border-top: 2px solid var(--line);
      border-left: 2px solid var(--line);
      border-top-left-radius: 18px;
      opacity: .6;
    }

    .ad__badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--signal);
      margin-bottom: 22px;
    }

    .ad__badge .no {
      color: var(--lo);
    }

    .ad__badge::after {
      content: "";
      flex: 1;
    }

    .ad__title {
      font-family: var(--tc);
      font-weight: 700;
      font-size: clamp(22px, 3.1vw, 34px);
      line-height: 1.35;
      letter-spacing: -.01em;
      margin-bottom: 26px;
    }

    .ad__title .lead {
      color: var(--line);
    }

    .ad__rows {
      display: flex;
      flex-direction: row;
      gap: 14px;
      transform-style: preserve-3d;
    }

    .ad__row {
      flex: 1 1 0;
      min-width: 0;
      /* three equal columns, side by side */
      position: relative;
      overflow: hidden;
      /* for mask/clip effects */
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--hairline);
      border-top: 3px solid var(--line);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: clamp(14px, 1.5vw, 17px);
      color: var(--hi);
    }

    @media (max-width:640px) {
      .ad__rows {
        flex-direction: column;
      }
    }

    .ad__row:nth-child(2) {
      border-top-color: var(--signal);
    }

    .ad__row:nth-child(3) {
      border-top-color: #E8EDF2;
    }

    .ad__row-i {
      display: block;
    }

    /* inner element effects can translate */
    .ad__num {
      font-family: var(--mono);
      color: var(--lo);
      font-size: 12px;
      margin-right: 10px;
    }

    /* drawn underline — only used by the depthzoom module, hidden elsewhere */
    .ad__line {
      display: none;
    }

    .ad[data-fx="depthzoom"] .ad__row {
      background: none;
      border: none;
      border-radius: 0;
      padding: 14px 2px;
    }

    .ad[data-fx="depthzoom"] .ad__line {
      display: block;
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      width: 100%;
      background: var(--line);
      transform-origin: 50% 50%;
    }

    .ad[data-fx="depthzoom"] .ad__row:nth-child(2) .ad__line {
      background: var(--signal);
    }

    .ad[data-fx="depthzoom"] .ad__row:nth-child(3) .ad__line {
      background: #E8EDF2;
    }

    /* ---- 04 · 太空艙 HUD：corner accent 的科技感變化版 ---- */
    .ad[data-fx="dashboard"] {
      background:
        radial-gradient(circle at 85% -10%, rgba(0, 224, 198, 0.14), transparent 55%),
        repeating-linear-gradient(135deg, rgba(0, 224, 198, 0.035) 0 2px, transparent 2px 18px),
        linear-gradient(180deg, var(--panel), var(--panel-2));
    }

    .ad[data-fx="dashboard"]::before {
      display: none;
      /* replaced by the 4-corner HUD brackets below */
    }

    .ad[data-fx="dashboard"] .ad__title .lead {
      text-shadow: 0 0 20px rgba(0, 224, 198, .35);
    }

    .ad__hud-corner {
      position: absolute;
      width: 30px;
      height: 30px;
      pointer-events: none;
    }

    .ad__hud-corner::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--signal);
      box-shadow: 0 0 8px var(--signal);
    }

    .ad__hud-corner.tl { left: 16px; top: 16px; border-top: 2px solid var(--line); border-left: 2px solid var(--line); transform-origin: 0% 0%; }
    .ad__hud-corner.tl::after { left: -2.5px; top: -2.5px; }
    .ad__hud-corner.tr { right: 16px; top: 16px; border-top: 2px solid var(--line); border-right: 2px solid var(--line); transform-origin: 100% 0%; }
    .ad__hud-corner.tr::after { right: -2.5px; top: -2.5px; }
    .ad__hud-corner.bl { left: 16px; bottom: 16px; border-bottom: 2px solid var(--line); border-left: 2px solid var(--line); transform-origin: 0% 100%; }
    .ad__hud-corner.bl::after { left: -2.5px; bottom: -2.5px; }
    .ad__hud-corner.br { right: 16px; bottom: 16px; border-bottom: 2px solid var(--line); border-right: 2px solid var(--line); transform-origin: 100% 100%; }
    .ad__hud-corner.br::after { right: -2.5px; bottom: -2.5px; }

    .ad__hud-scan {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      box-shadow: 0 0 14px var(--line);
      opacity: .75;
      pointer-events: none;
    }

    .ad__hud-leds {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .ad__hud-led {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--line);
      box-shadow: 0 0 6px var(--line);
    }

    .ad[data-fx="dashboard"] .ad__row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ad[data-fx="dashboard"] .ad__row-i {
      flex: 1;
    }

    .ad__gauge-wrap {
      position: relative;
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }

    .ad__gauge {
      transform: rotate(-90deg);
    }

    .ad__gauge-bg {
      fill: none;
      stroke: var(--hairline);
      stroke-width: 3;
    }

    .ad__gauge-fg {
      fill: none;
      stroke: var(--line);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dashoffset: 94.2;
      filter: drop-shadow(0 0 4px var(--line));
    }

    .ad[data-fx="dashboard"] .ad__row:nth-child(2) .ad__gauge-fg {
      stroke: var(--signal);
      filter: drop-shadow(0 0 4px var(--signal));
    }

    .ad[data-fx="dashboard"] .ad__row:nth-child(3) .ad__gauge-fg {
      stroke: #E8EDF2;
      filter: drop-shadow(0 0 4px #E8EDF2);
    }

    .ad__gauge-val {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--lo);
    }

    footer {
      padding: 80px 0 110px;
      text-align: center;
      color: var(--lo);
    }

    footer .big {
      font-family: var(--display);
      font-weight: 700;
      color: var(--hi);
      font-size: clamp(24px, 4vw, 44px);
      letter-spacing: -.02em;
      margin-bottom: 18px;
    }

    footer .metaf {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .08em;
    }

    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--line);
      outline-offset: 3px;
    }
  </style>
</head>

<body>

  <div class="topbar"><i id="topbar"></i></div>
  <a class="backlink" href="index.html">← 標本表 I</a>

  <div class="wrap">

    <!-- INTRO -->
    <header class="intro">
      <div class="kicker">Ad Module Lab</div>
      <h1>同一個版型，<br><em>四種</em>進場。</h1>
      <p>
        一個外框、一行 AI 導讀、三個橫向並排的文字框——這是數位廣告最常見的模組。
        下面用同一份版型重複四次，每一次換一種 GSAP 效果，<b style="color:var(--hi)">捲到畫面內才開始播</b>。
      </p>
      <div class="legend">
        <span>01 · 3D 翻入</span><span>02 · 景深推進</span><span>03 · 遮罩橫掃</span><span>04 · 太空艙 HUD</span>
      </div>
    </header>

    <!-- modules are injected here by JS so markup stays DRY -->
    <main id="modules"></main>

    <footer>
      <div class="big">想換成你的素材？</div>
      <div class="metaf">
        改 JS 裡的 MODULES 陣列即可換文字與效果<br>
        <a href="advanced.html">→ 進階標本表 II</a> &nbsp;·&nbsp; <a href="index.html">← 標本表 I</a>
      </div>
    </footer>

  </div>

  <!-- GSAP + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/SplitText.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger, SplitText);

    /* ---------- content (swap freely) ---------- */
    const MODULES = [
      {
        fx: "flip3d", name: "3D 翻入 / rotationX",
        title: "AI 導讀：用一句話，先看懂整支廣告的重點。",
        rows: ["智慧排版，讓每一格文字都落在最吸睛的位置。",
          "即時生成導讀，把冗長訊息濃縮成一行重點。",
          "跨裝置自動適配，手機平板桌機都剛剛好。"]
      },

      {
        fx: "depthzoom", name: "景深推進 / z + scale",
        title: "AI 導讀：從遠方推進，把焦點直送眼前。",
        rows: ["由遠到近的景深推進，強化主打訊息。",
          "縮放與淡入同步，視覺重心自然集中。",
          "適合促銷主標，一進場就是全場焦點。"]
      },

      {
        fx: "clip", name: "遮罩橫掃 / mask wipe",
        title: "AI 導讀：像刷一道光，把文字一行行揭開。",
        rows: ["遮罩橫掃揭露，乾淨俐落的資訊揭示。",
          "標題逐字浮現，閱讀節奏被精準掌控。",
          "適合資訊型廣告，條列重點清楚好讀。"]
      },

      {
        fx: "dashboard", name: "太空艙 HUD / 儀表板掃描",
        title: "AI 導讀：登艙啟動，座艙儀表全面同步。",
        rows: [
          { text: "即時遙測同步更新，座艙資訊一覽無遺。", value: 92 },
          { text: "全頻雷達掃描，異常訊號秒級鎖定。", value: 78 },
          { text: "推進系統狀態監控，讀數即時跳動回饋。", value: 95 },
        ]
      },
    ];

    /* ---------- build markup (DRY: same layout every time) ---------- */
    const host = document.getElementById("modules");
    MODULES.forEach((m, i) => {
      const stop = document.createElement("section");
      stop.className = "ad-stop";
      const isDashboard = m.fx === "dashboard";

      const rowsHtml = m.rows.map((row, ri) => {
        if (isDashboard) {
          return `<p class="ad__row">
            <span class="ad__gauge-wrap">
              <svg class="ad__gauge" viewBox="0 0 36 36" width="38" height="38">
                <circle class="ad__gauge-bg" cx="18" cy="18" r="15" />
                <circle class="ad__gauge-fg" cx="18" cy="18" r="15" data-value="${row.value}" style="stroke-dasharray:94.2" />
              </svg>
              <span class="ad__gauge-val">0%</span>
            </span>
            <span class="ad__row-i">${row.text}</span>
          </p>`;
        }
        return `<p class="ad__row"><span class="ad__row-i"><span class="ad__num">0${ri + 1}</span>${row}</span><span class="ad__line"></span></p>`;
      }).join("");

      const hudMarkup = isDashboard ? `
        <div class="ad__hud-corner tl"></div>
        <div class="ad__hud-corner tr"></div>
        <div class="ad__hud-corner bl"></div>
        <div class="ad__hud-corner br"></div>
        <div class="ad__hud-scan"></div>` : "";

      const ledsMarkup = isDashboard
        ? `<span class="ad__hud-leds"><span class="ad__hud-led"></span><span class="ad__hud-led"></span><span class="ad__hud-led"></span></span>`
        : "";

      stop.innerHTML = `
    <article class="ad" data-fx="${m.fx}">${hudMarkup}
      <div class="ad__badge"><span class="no">MODULE ${String(i + 1).padStart(2, "0")}</span> · EFFECT / ${m.name}${ledsMarkup}</div>
      <h2 class="ad__title"><span class="lead">${m.title}</span></h2>
      <div class="ad__rows">${rowsHtml}</div>
    </article>`;
      host.appendChild(stop);
    });

    /* top progress bar */
    gsap.to("#topbar", { scaleX: 1, ease: "none", scrollTrigger: { start: 0, end: "max", scrub: 0.3 } });

    /* ---------- effects ---------- */
    const fx = {
      // 01 · gentle 3D tilt-in, then title words and rows rise — slow & smooth
      flip3d(ad, title, rows) {
        const words = new SplitText(title, { type: "words" }).words;
        const tl = gsap.timeline({ scrollTrigger: { trigger: ad, start: "top 78%", toggleActions: "play none none reverse" } });
        // gentler rotation (-44 vs -75) + longer duration + power2 = no shadow thrash
        tl.from(ad, { rotationX: -44, y: 50, autoAlpha: 0, transformPerspective: 1300, transformOrigin: "50% 0%", duration: 1.4, ease: "power2.out" })
          // title rises word by word instead of per-char 3D flips (much smoother)
          .from(words, { yPercent: 60, autoAlpha: 0, stagger: 0.05, duration: 0.8, ease: "power2.out" }, "-=0.85")
          .from(rows, { y: 42, autoAlpha: 0, stagger: 0.18, duration: 0.8, ease: "power2.out" }, "-=0.5");
      },

      // 02 · gentle push from mid distance, then per box: draw a plain line from a
      //      point (no box styling), then the words rise in — slow, one box at a time.
      depthzoom(ad, title, rows) {
        const titleWords = new SplitText(title, { type: "words" }).words;
        const lines = [...rows].map(r => r.querySelector(".ad__line"));
        const rowWords = [...rows].map(r => new SplitText(r.querySelector(".ad__row-i"), { type: "words" }).words);

        // initial states applied now, so nothing flashes before the trigger fires
        gsap.set(ad, { autoAlpha: 0 });
        gsap.set(titleWords, { autoAlpha: 0, y: 14 });
        lines.forEach(l => gsap.set(l, { scaleX: 0, transformOrigin: "50% 50%" })); // collapsed to a point
        rowWords.forEach(ws => gsap.set(ws, { yPercent: 120, autoAlpha: 0 }));       // hidden below the line

        const tl = gsap.timeline({ scrollTrigger: { trigger: ad, start: "top 75%", toggleActions: "play none none reverse" } });

        // 1) card eases in from mid distance — small move = smooth
        tl.fromTo(ad, { scale: 0.96, z: -110 }, { scale: 1, z: 0, autoAlpha: 1, duration: 0.9, ease: "power2.out" })
          // 2) title words settle in
          .to(titleWords, { autoAlpha: 1, y: 0, stagger: 0.05, duration: 0.5 }, "-=0.35");

        // 3) box by box, slowly: draw the line out from a point, then words rise word by word
        rows.forEach((r, i) => {
          tl.to(lines[i], { scaleX: 1, duration: 0.7, ease: "power2.inOut" }, "+=0.25")        // draw the line, slow & clear
            .to(rowWords[i], { yPercent: 0, autoAlpha: 1, stagger: 0.1, duration: 0.6, ease: "power2.out" }, "-=0.05"); // 逐詞上升
        });
      },

      // 06 · mask wipe — rows reveal behind a clip, title chars rise inside a mask
      clip(ad, title, rows) {
        const lines = new SplitText(title, { type: "lines", mask: "lines" }).lines;
        const inners = ad.querySelectorAll(".ad__row-i");
        const tl = gsap.timeline({ scrollTrigger: { trigger: ad, start: "top 78%", toggleActions: "play none none reverse" } });
        tl.from(ad, { autoAlpha: 0, y: 24, duration: 0.5 })
          .from(lines, { yPercent: 115, stagger: 0.12, duration: 0.6, ease: "power3.out" }, "-=0.2")
          .from(inners, {
            xPercent: (i) => i % 2 ? 110 : -110, autoAlpha: 0,
            stagger: 0.14, duration: 0.6, ease: "power3.out"
          }, "-=0.3");
      },

      // 04 · spaceship cockpit HUD — corners snap in like a power-on sequence,
      //      title types on char by char, rows rise while their gauges sweep up.
      //      a radar scanline and blinking status LEDs loop for as long as the page lives.
      dashboard(ad, title, rows) {
        const titleChars = new SplitText(title, { type: "chars" }).chars;
        const gauges = ad.querySelectorAll(".ad__gauge-fg");
        const gaugeVals = ad.querySelectorAll(".ad__gauge-val");
        const corners = ad.querySelectorAll(".ad__hud-corner");
        const leds = ad.querySelectorAll(".ad__hud-led");
        const scan = ad.querySelector(".ad__hud-scan");

        gsap.set(ad, { autoAlpha: 0, y: 26 });
        gsap.set(corners, { scale: 0, autoAlpha: 0 });
        gsap.set(titleChars, { autoAlpha: 0 });
        gsap.set(rows, { autoAlpha: 0, y: 16 });

        const tl = gsap.timeline({ scrollTrigger: { trigger: ad, start: "top 75%", toggleActions: "play none none reverse" } });

        tl.to(ad, { autoAlpha: 1, y: 0, duration: 0.5, ease: "power2.out" })
          .to(corners, { scale: 1, autoAlpha: 1, duration: 0.45, stagger: 0.07, ease: "back.out(2.4)" }, "-=0.2")
          .to(titleChars, { autoAlpha: 1, stagger: 0.02, duration: 0.01 }, "-=0.1")
          .to(rows, { autoAlpha: 1, y: 0, stagger: 0.16, duration: 0.5, ease: "power2.out" }, "-=0.2");

        gauges.forEach((g, i) => {
          const val = parseFloat(g.dataset.value);
          const offset = 94.2 * (1 - val / 100);
          const counter = { v: 0 };
          tl.to(g, { strokeDashoffset: offset, duration: 0.9, ease: "power2.out" }, i === 0 ? "-=0.1" : "<")
            .to(counter, {
              v: val, duration: 0.9, ease: "power2.out",
              onUpdate: () => { if (gaugeVals[i]) gaugeVals[i].textContent = Math.round(counter.v) + "%"; }
            }, "<");
        });

        // ambient HUD loops — kick off once and keep running for the page's lifetime
        ScrollTrigger.create({
          trigger: ad, start: "top 85%", once: true,
          onEnter: () => {
            gsap.fromTo(scan, { top: "0%" }, { top: "100%", duration: 2.6, repeat: -1, ease: "sine.inOut" });
            gsap.to(leds, { autoAlpha: 0.15, duration: 0.45, stagger: { each: 0.18, repeat: -1, yoyo: true } });
          }
        });
      }
    };

    /* ---------- wire up, respecting reduced motion ---------- */
    const mm = gsap.matchMedia();
    mm.add("(prefers-reduced-motion: no-preference)", () => {
      document.querySelectorAll(".ad").forEach((ad) => {
        const title = ad.querySelector(".ad__title");
        const rows = ad.querySelectorAll(".ad__row");
        const fn = fx[ad.dataset.fx];
        if (fn) fn(ad, title, rows);
      });
    });

    /* refresh once fonts settle so triggers measure correctly */
    document.fonts.ready.then(() => ScrollTrigger.refresh());
    window.addEventListener("load", () => ScrollTrigger.refresh());
  </script>
</body>

</html>
